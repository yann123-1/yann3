<!DOCTYPE html>
<html>
<head>
    <title>Iframe 練習作業</title>
    <style>
        /* 老師要求：使用 CSS 來顯示無邊框的 iframe */
        .my-iframe {
            border: none;
        }
    </style>
</head>
<body>

    <h2>我的 Iframe 練習</h2>

    <iframe src="https://www.w3schools.com" 
            width="500" 
            height="500" 
            class="my-iframe"
            title="W3Schools Website">
    </iframe>

    <p>說明：這是一個寬 500px、高 500px 且透過 CSS 去除邊框的內嵌框架。</p>

</body>
</html>
